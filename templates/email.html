{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickJobs Login</title>

<link href="{% static 'css/email.css' %}" rel="stylesheet">
</head>

<body>

<div class="login-card">

<h1>Quick<span>Jobs.</span></h1>
<p class="tagline">Empowering your career</p>

<!-- PHONE SECTION -->
<div id="phoneSection">

<input
    type="tel"
    id="phone"
    placeholder="Enter mobile number"
    maxlength="10"
    inputmode="numeric"
    autocomplete="tel"
    required
>

<div id="recaptcha-container"></div>

<button type="button" id="sendOtpBtn">
    Send OTP →
</button>

</div>


<!-- OTP SECTION -->
<div id="otpSection" style="display:none;">

<p>Enter the 6 digit OTP</p>

<input
    type="text"
    id="otp"
    placeholder="Enter OTP"
    maxlength="6"
    inputmode="numeric"
    autocomplete="one-time-code"
>

<button type="button" id="verifyOtpBtn">
    Verify OTP →
</button>

<button
    type="button"
    id="resendOtpBtn"
    disabled
>
    Resend OTP in 60s
</button>

</div>

<p id="message"></p>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getAuth,
    RecaptchaVerifier,
    signInWithPhoneNumber
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const firebaseConfig = {
    apiKey: "AIzaSyAnI8mX3rqgWQs5tZ3eeaNZK6NUze648Vk",
    authDomain: "quickjobs-acd4a.firebaseapp.com",
    projectId: "quickjobs-acd4a",
    storageBucket: "quickjobs-acd4a.firebasestorage.app",
    messagingSenderId: "736989435005",
    appId: "1:736989435005:web:dd292c2e284970fdffcd14",
    measurementId: "G-64JYBH3G48"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

auth.useDeviceLanguage();


const phoneInput = document.getElementById("phone");
const otpInput = document.getElementById("otp");

const sendOtpBtn = document.getElementById("sendOtpBtn");
const verifyOtpBtn = document.getElementById("verifyOtpBtn");
const resendOtpBtn = document.getElementById("resendOtpBtn");

const phoneSection = document.getElementById("phoneSection");
const otpSection = document.getElementById("otpSection");
const message = document.getElementById("message");


let resendTimer = null;
let resendSeconds = 60;
let resendAttempts = 0;

const maxResendAttempts = 3;


function createRecaptcha() {
    if (window.recaptchaVerifier) {
        window.recaptchaVerifier.clear();
    }

    window.recaptchaVerifier = new RecaptchaVerifier(
        auth,
        "recaptcha-container",
        {
            size: "normal"
        }
    );
}


function startResendTimer() {
    clearInterval(resendTimer);

    resendSeconds = 60;
    resendOtpBtn.disabled = true;
    resendOtpBtn.innerText =
        `Resend OTP in ${resendSeconds}s`;

    resendTimer = setInterval(() => {
        resendSeconds--;

        if (resendSeconds > 0) {
            resendOtpBtn.innerText =
                `Resend OTP in ${resendSeconds}s`;
        } else {
            clearInterval(resendTimer);

            if (resendAttempts < maxResendAttempts) {
                resendOtpBtn.disabled = false;
                resendOtpBtn.innerText = "Resend OTP";
            } else {
                resendOtpBtn.disabled = true;
                resendOtpBtn.innerText =
                    "Maximum resend limit reached";
            }
        }
    }, 1000);
}


function showFirebaseError(error) {
    console.error(error);

    if (error.code === "auth/too-many-requests") {
        message.innerText =
            "Too many OTP attempts. Please wait and try again later.";
    } else if (error.code === "auth/quota-exceeded") {
        message.innerText =
            "OTP service limit reached. Please try again later.";
    } else if (error.code === "auth/invalid-phone-number") {
        message.innerText =
            "Enter a valid mobile number.";
    } else if (error.code === "auth/captcha-check-failed") {
        message.innerText =
            "Verification failed. Refresh the page and try again.";
    } else if (error.code === "auth/code-expired") {
        message.innerText =
            "OTP expired. Please resend OTP.";
    } else if (error.code === "auth/invalid-verification-code") {
        message.innerText =
            "Invalid OTP. Please try again.";
    } else {
        message.innerText =
            "OTP could not be sent. Please try again.";
    }
}


createRecaptcha();


sendOtpBtn.addEventListener("click", async function () {

    const mobile = phoneInput.value.trim();

    if (!/^[6-9]\d{9}$/.test(mobile)) {
        message.innerText =
            "Enter a valid 10 digit mobile number";
        return;
    }

    const phoneNumber = "+91" + mobile;

    sendOtpBtn.disabled = true;
    sendOtpBtn.innerText = "Sending OTP...";
    message.innerText = "";

    try {

        window.confirmationResult =
            await signInWithPhoneNumber(
                auth,
                phoneNumber,
                window.recaptchaVerifier
            );

        sessionStorage.setItem(
            "quickjobs_phone",
            phoneNumber
        );

        phoneSection.style.display = "none";
        otpSection.style.display = "block";

        message.innerText =
            "OTP sent successfully";

        otpInput.focus();

        startResendTimer();

    } catch (error) {

        showFirebaseError(error);

        sendOtpBtn.disabled = false;
        sendOtpBtn.innerText = "Send OTP →";

        createRecaptcha();
    }
});


resendOtpBtn.addEventListener("click", async function () {

    if (resendAttempts >= maxResendAttempts) {
        message.innerText =
            "Maximum resend attempts reached. Please try again later.";

        resendOtpBtn.disabled = true;
        return;
    }

    const phoneNumber =
        sessionStorage.getItem("quickjobs_phone");

    if (!phoneNumber) {
        message.innerText =
            "Phone number missing. Please refresh and try again.";
        return;
    }

    resendOtpBtn.disabled = true;
    resendOtpBtn.innerText = "Resending...";
    message.innerText = "";

    try {

        createRecaptcha();

        window.confirmationResult =
            await signInWithPhoneNumber(
                auth,
                phoneNumber,
                window.recaptchaVerifier
            );

        resendAttempts++;

        message.innerText =
            "OTP resent successfully";

        otpInput.value = "";
        otpInput.focus();

        startResendTimer();

    } catch (error) {

        showFirebaseError(error);

        resendOtpBtn.disabled = false;
        resendOtpBtn.innerText = "Resend OTP";

        createRecaptcha();
    }
});


verifyOtpBtn.addEventListener("click", async function () {

    const otp = otpInput.value.trim();

    if (!/^\d{6}$/.test(otp)) {
        message.innerText =
            "Enter a valid 6 digit OTP";
        return;
    }

    if (!window.confirmationResult) {
        message.innerText =
            "Please send OTP again";
        return;
    }

    verifyOtpBtn.disabled = true;
    verifyOtpBtn.innerText = "Verifying...";
    message.innerText = "";

    try {

        const result =
            await window.confirmationResult.confirm(otp);

        const phoneNumber =
            result.user.phoneNumber;

        await loginDjango(phoneNumber);

    } catch (error) {

        showFirebaseError(error);

        verifyOtpBtn.disabled = false;
        verifyOtpBtn.innerText = "Verify OTP →";
    }
});


async function loginDjango(phoneNumber) {

    try {
        const response = await fetch(
            "{% url 'firebase_login' %}",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },

                body: JSON.stringify({
                    phone: phoneNumber
                })
            }
        );

        const data = await response.json();

        if (response.ok && data.success) {
            window.location.href = data.redirect_url;
        } else {
            message.innerText =
                data.message || "Django login failed";

            verifyOtpBtn.disabled = false;
            verifyOtpBtn.innerText = "Verify OTP →";
        }

    } catch (error) {
        console.error(error);

        message.innerText =
            "Server connection failed. Please try again.";

        verifyOtpBtn.disabled = false;
        verifyOtpBtn.innerText = "Verify OTP →";
    }
}


function getCookie(name) {

    let cookieValue = null;

    if (document.cookie && document.cookie !== "") {

        const cookies = document.cookie.split(";");

        for (let cookie of cookies) {

            cookie = cookie.trim();

            if (cookie.startsWith(name + "=")) {

                cookieValue = decodeURIComponent(
                    cookie.substring(name.length + 1)
                );

                break;
            }
        }
    }

    return cookieValue;
}

</script>

</body>
</html>
